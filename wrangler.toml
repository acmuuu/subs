name = "subs"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# 静态资源（favicon 等）；run_worker_first 保证 /api、应用页面等仍由 Worker 处理
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[env.production]
name = "subscription-manager"

[env.staging]
name = "subscription-manager-staging"

# KV：变量名必须为 SUBSCRIPTIONS_KV（与 src/data/config.js 一致）
# id：生产环境命名空间 ID（Dashboard → Workers KV，或 npx wrangler kv namespace list）
# preview_id：wrangler dev 本地预览用；可另建命名空间，或与 id 相同
[[kv_namespaces]]
binding = "SUBSCRIPTIONS_KV"
id = "b97f0ec3458541a99d317d90dc35844b"
preview_id = "b97f0ec3458541a99d317d90dc35844b"

# 定时任务配置 - 每小时检查一次（UTC）
[triggers]
crons = ["0 * * * *"]

# 环境变量（可选，也可以在 Cloudflare Dashboard 中设置）
[vars]
ENVIRONMENT = "production"
