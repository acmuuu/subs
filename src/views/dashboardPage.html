<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 - SubsTracker</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/dashboard.css">
  ${themeResources}
</head>
<body class="bg-gray-100 min-h-screen">
  <nav class="bg-white shadow-md relative z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-14">
        <div class="flex items-center shrink-0">
          <a href="/dashboard" class="flex items-center rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1 no-underline hover:opacity-90 transition-opacity" aria-label="订阅管理系统，前往仪表盘">
            <i class="fas fa-calendar-check text-indigo-600 text-2xl mr-2"></i>
            <span class="font-bold text-xl text-gray-800">订阅管理系统</span>
          </a>
          <span id="systemTimeDisplay" class="ml-4 text-base text-indigo-600 font-normal hidden md:inline-flex md:items-baseline md:gap-x-2 pt-1" aria-live="polite">
            <span class="nav-clock-time"></span><span class="nav-clock-tz"></span>
          </span>
        </div>
        
        <div class="hidden md:flex items-center space-x-4 ml-auto">
          <a href="/dashboard" class="text-indigo-600 border-b-2 border-indigo-600 px-3 py-2 rounded-md text-sm font-medium transition">
            <i class="fas fa-chart-line mr-1"></i>仪表盘
          </a>
          <a href="/list" class="text-gray-700 hover:text-gray-900 border-b-2 border-transparent hover:border-gray-300 px-3 py-2 rounded-md text-sm font-medium transition">
            <i class="fas fa-list mr-1"></i>订阅列表
          </a>
          <a href="/new" class="text-gray-700 hover:text-gray-900 border-b-2 border-transparent hover:border-gray-300 px-3 py-2 rounded-md text-sm font-medium transition">
            <i class="fas fa-plus mr-1"></i>添加订阅
          </a>
          <a href="/config" class="text-gray-700 hover:text-gray-900 border-b-2 border-transparent hover:border-gray-300 px-3 py-2 rounded-md text-sm font-medium transition">
            <i class="fas fa-cog mr-1"></i>系统配置
          </a>
          <a href="/logout" class="text-gray-700 hover:text-red-600 border-b-2 border-transparent hover:border-red-300 px-3 py-2 rounded-md text-sm font-medium transition">
            <i class="fas fa-sign-out-alt mr-1"></i>退出登录
          </a>
        </div>

        <div class="flex items-center md:hidden ml-auto">
          <button id="mobile-menu-btn" type="button" aria-expanded="false" aria-label="切换导航菜单" class="text-gray-600 hover:text-indigo-600 focus:outline-none p-2 rounded-md hover:bg-gray-100 active:bg-gray-200 transition-colors">
            <i class="fas fa-bars text-xl"></i>
          </button>
        </div>
      </div>
    </div>

    <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-b border-gray-200 w-full">
      <div class="px-4 pt-2 pb-4 space-y-2">
        <div id="mobileTimeDisplay" class="px-3 py-2.5 text-sm font-medium text-indigo-600 text-left border-b border-gray-100 mb-2 leading-snug flex flex-wrap items-baseline gap-x-2" aria-live="polite">
          <span class="nav-clock-time"></span><span class="nav-clock-tz"></span>
        </div>
        <a href="/dashboard" class="block px-3 py-3 rounded-md text-base font-medium text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 active:bg-indigo-100 transition-colors">
          <i class="fas fa-chart-line w-6 text-center mr-2"></i>仪表盘
        </a>
        <a href="/list" class="block px-3 py-3 rounded-md text-base font-medium text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 active:bg-indigo-100 transition-colors">
          <i class="fas fa-list w-6 text-center mr-2"></i>订阅列表
        </a>
        <a href="/new" class="block px-3 py-3 rounded-md text-base font-medium text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 active:bg-indigo-100 transition-colors">
          <i class="fas fa-plus w-6 text-center mr-2"></i>添加订阅
        </a>
        <a href="/config" class="block px-3 py-3 rounded-md text-base font-medium text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 active:bg-indigo-100 transition-colors">
          <i class="fas fa-cog w-6 text-center mr-2"></i>系统配置
        </a>
        <a href="/logout" class="block px-3 py-3 rounded-md text-base font-medium text-gray-700 hover:bg-red-50 hover:text-red-600 active:bg-red-100 transition-colors">
          <i class="fas fa-sign-out-alt w-6 text-center mr-2"></i>退出登录
        </a>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5">
    <div class="mb-3">
      <h2 class="text-2xl font-bold text-gray-800">📊 仪表板</h2>
      <p class="text-sm text-gray-500 mt-1">订阅费用和活动概览（统计金额已折合为 CNY）</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-3" id="statsGrid">
      <div class="loading-skeleton"></div>
      <div class="loading-skeleton"></div>
      <div class="loading-skeleton"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-3">
      <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <div class="px-2 sm:px-3 py-3 border-b border-gray-200 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <i class="fas fa-chart-bar text-purple-500"></i>
            <h3 class="text-lg font-medium text-gray-900">按类型支出排行</h3>
          </div>
          <span class="px-3 py-1 bg-indigo-100 text-indigo-800 text-xs font-medium rounded-full">年度统计 (折合CNY)</span>
        </div>
        <div class="px-2 py-3 sm:px-3 sm:py-4" id="expenseByType">
          <div class="loading-skeleton"></div>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <div class="px-2 sm:px-3 py-3 border-b border-gray-200 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <i class="fas fa-folder text-green-500"></i>
            <h3 class="text-lg font-medium text-gray-900">按分类支出统计</h3>
          </div>
          <span class="px-3 py-1 bg-indigo-100 text-indigo-800 text-xs font-medium rounded-full">年度统计 (折合CNY)</span>
        </div>
        <div class="px-2 py-3 sm:px-3 sm:py-4" id="expenseByCategory">
          <div class="loading-skeleton"></div>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-md overflow-hidden mb-3">
      <div class="px-2 sm:px-3 py-3 border-b border-gray-200 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <i class="fas fa-history text-indigo-500"></i>
          <h3 class="text-lg font-medium text-gray-900">自动提醒任务状态</h3>
        </div>
        <span class="px-3 py-1 bg-indigo-100 text-indigo-800 text-xs font-medium rounded-full">Cron 可观测性</span>
      </div>
      <div class="px-2 py-3 sm:px-3 sm:py-4" id="schedulerStatus">
        <div class="loading-skeleton"></div>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-md overflow-hidden mb-3">
      <div class="px-2 sm:px-3 py-3 border-b border-gray-200 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <i class="fas fa-calendar-check text-blue-500"></i>
          <h3 class="text-lg font-medium text-gray-900">最近支付</h3>
        </div>
        <span class="px-3 py-1 bg-indigo-100 text-indigo-800 text-xs font-medium rounded-full">过去7天</span>
      </div>
      <div class="px-2 py-3 sm:px-3 sm:py-4" id="recentPayments">
        <div class="loading-skeleton"></div>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-md overflow-hidden mb-3">
      <div class="px-2 sm:px-3 py-3 border-b border-gray-200 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <i class="fas fa-clock text-yellow-500"></i>
          <h3 class="text-lg font-medium text-gray-900">即将续费</h3>
        </div>
        <span class="px-3 py-1 bg-indigo-100 text-indigo-800 text-xs font-medium rounded-full">未来7天</span>
      </div>
      <div class="px-2 py-3 sm:px-3 sm:py-4" id="upcomingRenewals">
        <div class="loading-skeleton"></div>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-md overflow-hidden mb-3">
      <div class="px-2 sm:px-3 py-3 border-b border-gray-200 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <i class="fas fa-stream text-indigo-500"></i>
          <h3 class="text-lg font-medium text-gray-900">自动提醒任务历史（最近10次）</h3>
        </div>
      </div>
      <div class="px-2 py-3 sm:px-3 sm:py-4" id="schedulerStatusHistory">
        <div class="loading-skeleton"></div>
      </div>
    </div>
  </div>

    <script src="/js/dashboard.js" defer></script>
</body>
</html>
